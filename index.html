<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andromeda Server Control Center</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');

        body {
            background-color: #060608;
            font-family: 'Inter', sans-serif;
            color: #e1e1e6;
            overflow-x: hidden;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(17, 17, 21, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card-hover {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card-hover:hover {
            transform: translateY(-2px);
            background: rgba(22, 22, 28, 0.7);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.15);
        }

        /* SVG Path Flow Telemetry Keyframes */
        @keyframes flow-active {
            to {
                stroke-dashoffset: -20;
            }
        }

        .path-flow {
            stroke-dasharray: 6 4;
            animation: flow-active 1.5s linear infinite;
        }

        .path-flow-fast {
            stroke-dasharray: 8 4;
            animation: flow-active 0.8s linear infinite;
        }

        /* SVG Node Hover Scaling */
        .svg-node {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            transform-box: fill-box;
            transform-origin: center;
        }

        .svg-node:hover {
            transform: scale(1.03);
            filter: drop-shadow(0 0 6px var(--node-color, rgba(255,255,255,0.2)));
        }

        /* Sleek scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

            lidarr: { id: "118", name: "lidarr", status: "running", ip: "192.168.1.18", bridge: "vmbr0", cpu: 2, ram: "1.00 GiB", ramVal: 1, disk: "4.00 GiB", diskVal: 4, desc: "Music collection manager and PVR for Usenet and BitTorrent. Automatically tracks artists, fetches releases, and processes albums into bulk storage libraries.", tags: ["arr", "pvr"], color: "#f97316", docLink: "https://lidarr.audio/", scriptLink: "https://helper-scripts.com/" }

            "Jellyseerr": "jellyseerr",
            "Sonarr": "sonarr",
            "Radarr": "radarr",
            "Bazarr": "bazarr",
            "Lidarr": "lidarr",
            "Flaresolverr": "flaresolverr",
            "Ollama": "ollama",
            "Open WebUI": "openwebui",
            "n8n": "n8n",
            "Hermes": "hermesagent",
            "Homepage": "homepage",
            "Pulse": "pulse",
            "Paperless": "paperless-ngx",
            "BentoPDF": "bentopdf"
        };

        const colors = {
            bg: '#060608',
            card: '#111116',
            border: '#202028',
            text: '#e1e1e6',
            subtext: '#8a8a9e',
            vpn: '#8b5cf6',
            net: '#10b981',
            media: '#3b82f6',
            arr: '#f97316',
            ai: '#eab308',
            dash: '#64748b',
            storage: '#ec4899',
            exterior: '#06b6d4',
            agent: '#a855f7'
        };

        // --- Application State Manager ---
        const state = {
            currentTab: 'dashboard',
            selectedNode: null, // null means Proxmox Host overall
            activeFlow: 'all',
            simulating: true,
            searchQuery: '',
            filterTag: 'all',
            detailContainer: null,
            copySuccess: false,
            hostMetrics: {
                cpu: 28.4,
                ram: 20.4,
                tx: 2.3,
                rx: 7.2,
                cpuHistory: [25, 28, 30, 26, 32, 29, 35, 31, 28, 31]
            },
            containerWorkloads: {}
        };

        // Populate initial container workloads
        Object.keys(containersData).forEach(key => {
            state.containerWorkloads[key] = { cpu: 1.1, ram: 15 };
        });

        // Set up Simulation Timer (fluctuates metric values in state)
        setInterval(() => {
            if (state.simulating) {
                // Host CPU
                const change = (Math.random() - 0.5) * 4;
                const newCpu = Math.max(12, Math.min(85, +(state.hostMetrics.cpu + change).toFixed(1)));
                state.hostMetrics.cpu = newCpu;
                state.hostMetrics.cpuHistory.push(newCpu);
                if (state.hostMetrics.cpuHistory.length > 10) state.hostMetrics.cpuHistory.shift();

                // Host network
                const txChange = (Math.random() - 0.5) * 0.8;
                const rxChange = (Math.random() - 0.5) * 2;
                state.hostMetrics.tx = Math.max(0.2, Math.min(20, +(state.hostMetrics.tx + txChange).toFixed(1)));
                state.hostMetrics.rx = Math.max(0.5, Math.min(85, +(state.hostMetrics.rx + rxChange).toFixed(1)));

                // Host RAM
                const ramChange = (Math.random() - 0.5) * 0.1;
                state.hostMetrics.ram = Math.max(18, Math.min(23, +(state.hostMetrics.ram + ramChange).toFixed(1)));

                // Container loads
                Object.keys(containersData).forEach(key => {
                    let baseCpu = 0.5;
                    let baseRam = 12;
                    if (key === 'jellyfin') { baseCpu = Math.random() > 0.8 ? 48 : 6; baseRam = 45; }
                    else if (key === 'ollama') { baseCpu = Math.random() > 0.85 ? 85 : 1.1; baseRam = 80; }
                    else if (key === 'openwebui') { baseCpu = 1.8; baseRam = 20; }
                    else if (key === 'qbittorrent') { baseCpu = 3; baseRam = 26; }
                    else if (key === 'hermesagent') { baseCpu = 4; baseRam = 30; }

                    state.containerWorkloads[key] = {
                        cpu: +(baseCpu + Math.random() * 2).toFixed(1),
                        ram: Math.max(5, Math.min(95, +(baseRam + (Math.random() - 0.5) * 3).toFixed(1)))
                    };
                });

                // Update the visual representation
                updateUI();
            }
        }, 1500);

        // --- Global Interactive Action Handlers (Accessible from HTML) ---
        window.selectTab = (tabId) => {
            state.currentTab = tabId;
            updateUI();
        };

        window.selectNode = (label) => {
            const key = labelToKey[label];
            if (key && containersData[key]) {
                state.selectedNode = containersData[key];
            } else {
                state.selectedNode = null;
            }
            updateUI();
        };

        window.clearSelectedNode = () => {
            state.selectedNode = null;
            updateUI();
        };

        window.selectFlow = (flowId) => {
            state.activeFlow = flowId;
            updateUI();
        };

        window.toggleSimulation = () => {
            state.simulating = !state.simulating;
            updateUI();
        };

        window.openContainerDetail = (id) => {
            if (containersData[id]) {
                state.detailContainer = containersData[id];
            }
            updateUI();
        };

        window.closeContainerDetail = () => {
            state.detailContainer = null;
            updateUI();
        };

        window.copyIp = (ip) => {
            if (ip === 'DHCP') return;
            navigator.clipboard.writeText(ip);
            state.copySuccess = true;
            updateUI();
            setTimeout(() => {
                state.copySuccess = false;
                updateUI();
            }, 2000);
        };

        window.setSearchQuery = (query) => {
            state.searchQuery = query;
            updateUI();
        };

        window.setFilterTag = (tag) => {
            state.filterTag = tag;
            updateUI();
        };

        // --- UI Rendering Engine (Vanilla ES6 Templates) ---
        function updateUI() {
            const container = document.getElementById('app');
