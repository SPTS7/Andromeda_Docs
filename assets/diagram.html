<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox Architecture</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0a0a0c;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icon Components (Lucide replacements) ---
        const Shield = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
        );

        const HardDrive = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <line x1="22" y1="12" x2="2" y2="12" />
                <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
                <line x1="6" y1="16" x2="6.01" y2="16" />
                <line x1="10" y1="16" x2="10.01" y2="16" />
            </svg>
        );

        const Globe = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
        );

        const Lock = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        );

        const Activity = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
        );

        const Cpu = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
                <rect x="9" y="9" width="6" height="6" />
                <line x1="9" y1="1" x2="9" y2="4" />
                <line x1="15" y1="1" x2="15" y2="4" />
                <line x1="9" y1="20" x2="9" y2="23" />
                <line x1="15" y1="20" x2="15" y2="23" />
                <line x1="20" y1="9" x2="23" y2="9" />
                <line x1="20" y1="14" x2="23" y2="14" />
                <line x1="1" y1="9" x2="4" y2="9" />
                <line x1="1" y1="14" x2="4" y2="14" />
            </svg>
        );

        const Network = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
        );

        const Book = ({ size = 24, className = "", ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
        );

        // --- Main Application ---
        const App = () => {
            const [activeFlow, setActiveFlow] = useState('all'); // 'all', 'vpn', 'automation', 'storage', 'exterior'

            // Theme Colors
            const colors = {
                bg: '#0a0a0c',
                card: '#16161a',
                border: '#2d2d34',
                text: '#e1e1e6',
                subtext: '#9494a5',
                vpn: '#8b5cf6',
                net: '#10b981',
                media: '#3b82f6',
                arr: '#f97316',
                ai: '#eab308',
                dash: '#64748b',
                storage: '#ec4899',
                exterior: '#06b6d4'
            };

            const FlowButton = ({ id, label, color, icon: Icon }) => (
                <button
                    onClick={() => setActiveFlow(id)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-full border transition-all ${activeFlow === id
                        ? `bg-opacity-20 border-opacity-100 text-white`
                        : 'bg-transparent border-gray-700 text-gray-500 hover:border-gray-500'
                        }`}
                    style={{
                        backgroundColor: activeFlow === id ? `${color}33` : 'transparent',
                        borderColor: activeFlow === id ? color : undefined,
                        color: activeFlow === id ? 'white' : '#6b7280'
                    }}
                >
                    <Icon size={16} color={activeFlow === id ? color : '#666'} />
                    <span className="text-sm font-medium">{label}</span>
                </button>
            );

            return (
                <div className="flex flex-col items-center justify-start min-h-screen p-8 w-full" style={{ backgroundColor: colors.bg, color: colors.text }}>
                    <div className="max-w-7xl w-full">
                        <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight text-white mb-2">Andromeda Architecture <span className="text-blue-500">v1</span></h1>
                                <p style={{ color: colors.subtext }}>Interactive infrastructure map and traffic flow analysis.</p>
                            </div>

                            <div className="flex flex-wrap gap-2">
                                <FlowButton id="all" label="All Flows" color="#ffffff" icon={Activity} />
                                <FlowButton id="vpn" label="VPN Tunnel" color={colors.vpn} icon={Shield} />
                                <FlowButton id="exterior" label="Exterior" color={colors.exterior} icon={Globe} />
                                <FlowButton id="automation" label="Media Logic" color={colors.arr} icon={Activity} />
                                <FlowButton id="storage" label="Storage" color={colors.storage} icon={HardDrive} />

                                <div className="w-full md:w-auto mt-2 md:mt-0 md:ml-4 border-l border-gray-800 pl-4">
                                    <a href="../home/" target="_top" className="flex items-center gap-2 px-5 py-2 rounded-full bg-blue-600 hover:bg-blue-500 text-white transition-all shadow-lg hover:shadow-blue-500/20 no-underline group">
                                        <Book size={16} className="group-hover:scale-110 transition-transform" />
                                        <span className="text-sm font-bold tracking-wide">Enter Docs</span>
                                    </a>
                                </div>
                            </div>
                        </header>

                        <div className="relative overflow-hidden rounded-2xl border border-gray-800 bg-[#0f0f12] shadow-2xl">
                            <svg viewBox="0 0 1300 850" className="w-full h-auto select-none">
                                <defs>
                                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                        <feGaussianBlur stdDeviation="3" result="blur" />
                                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                    </filter>
                                    <marker id="arr-vpn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill={colors.vpn} />
                                    </marker>
                                    <marker id="arr-ext" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill={colors.exterior} />
                                    </marker>
                                    <marker id="arr-logic" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill={colors.arr} />
                                    </marker>
                                    <marker id="arr-std" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#444" />
                                    </marker>
                                    <marker id="arr-storage" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill={colors.storage} />
                                    </marker>
                                </defs>

                                {/* Public Internet Node */}
                                <g transform="translate(480, 40)">
                                    <rect x="-80" y="0" width="160" height="50" rx="25" fill="#1a1a2e" stroke="#444" strokeWidth="1" />
                                    <text x="15" y="30" textAnchor="middle" className="text-[14px] font-bold fill-white tracking-widest uppercase">Public Web</text>
                                    <Globe x="-55" y="17" size={16} className="text-blue-400 opacity-50" />
                                </g>

                                {/* Tailscale Node - Next to Public Web */}
                                <g transform="translate(800, 40)">
                                    <rect x="-80" y="0" width="160" height="50" rx="25" fill="#0f1f26" stroke={colors.exterior} strokeWidth="1" />
                                    <text x="10" y="30" textAnchor="middle" className="text-[14px] font-bold fill-white tracking-widest uppercase">Tailscale</text>
                                    <Network x="-50" y="17" size={16} className="text-cyan-400 opacity-50" />
                                </g>

                                {/* Proxmox Host Container */}
                                <rect x="40" y="140" width="1220" height="660" rx="20" fill="#0c0c0e" stroke="#222" strokeWidth="2" />
                                <text x="60" y="165" className="text-[12px] font-bold fill-gray-600 tracking-widest uppercase">Node: Andromeda</text>

                                {/* Section: Network Stack - TopRight: (240, 200) */}
                                <g transform="translate(60, 200)">
                                    <rect width="180" height="380" rx="12" fill="#111115" stroke="#222" />
                                    <text x="90" y="-15" textAnchor="middle" className="text-[11px] font-bold fill-gray-500 uppercase">Network Stack</text>

                                    <Node x="30" y="30" label="Wireguard" color={colors.vpn} icon="shield" />
                                    <Node x="30" y="130" label="qBittorrent" color={colors.net} />
                                    <Node x="30" y="230" label="Prowlarr" color={colors.net} />
                                </g>

                                {/* Section: Media & Content - TopRight: (750, 200) */}
                                <g transform="translate(300, 200)">
                                    <rect width="450" height="380" rx="12" fill="#111115" stroke="#222" />
                                    <text x="225" y="-15" textAnchor="middle" className="text-[11px] font-bold fill-gray-500 uppercase">Media & Content</text>

                                    <Node x="30" y="30" label="Jellyfin" color={colors.media} />
                                    <Node x="310" y="30" label="Jellyseerr" color={colors.media} />

                                    <Node x="30" y="130" label="Sonarr" color={colors.arr} />
                                    <Node x="170" y="130" label="Radarr" color={colors.arr} />
                                    <Node x="310" y="130" label="Bazarr" color={colors.arr} />

                                    <Node x="170" y="230" label="Flaresolverr" color={colors.dash} />
                                </g>

                                {/* Section: AI Labs - TopRight: (970, 200) */}
                                <g transform="translate(810, 200)">
                                    <rect width="160" height="380" rx="12" fill="#111115" stroke="#222" />
                                    <text x="80" y="-15" textAnchor="middle" className="text-[11px] font-bold fill-gray-500 uppercase">AI Labs</text>
                                    <Node x="20" y="50" label="Ollama" color={colors.ai} />
                                    <Node x="20" y="160" label="n8n" color={colors.ai} />
                                </g>

                                {/* Section: General Tools - TopRight: (1240, 200) */}
                                <g transform="translate(1030, 200)">
                                    <rect width="210" height="380" rx="12" fill="#111115" stroke="#222" />
                                    <text x="105" y="-15" textAnchor="middle" className="text-[11px] font-bold fill-gray-500 uppercase">General Tools</text>
                                    <Node x="45" y="30" label="Homepage" color={colors.dash} />
                                    <Node x="45" y="100" label="Beszel" color={colors.dash} />
                                    <Node x="45" y="170" label="Paperless" color={colors.dash} />
                                    <Node x="45" y="240" label="BentoPDF" color={colors.dash} />
                                    <Node x="45" y="310" label="SysTools" color={colors.dash} />
                                </g>

                                {/* Storage Layer - HDD (Media Only) */}
                                <g transform="translate(60, 680)">
                                    <rect width="700" height="40" rx="6" fill="#1a1a20" stroke={colors.storage} strokeWidth="2" strokeDasharray="4 4" />
                                    <text x="350" y="25" textAnchor="middle" className="text-[12px] font-bold fill-gray-400 tracking-[0.2em] uppercase">
                                        <HardDrive size={12} className="inline mr-2" /> HDD Array (Media)
                                    </text>
                                </g>

                                {/* Storage Layer - SSD (System/Global) */}
                                <g transform="translate(40, 750)">
                                    <rect width="1220" height="40" rx="6" fill="#1a1a20" stroke={colors.storage} strokeWidth="1" />
                                    <text x="610" y="25" textAnchor="middle" className="text-[12px] font-bold fill-gray-400 tracking-[0.2em] uppercase">
                                        <HardDrive size={12} className="inline mr-2" /> SSD System Pool (Cache/Config/OS)
                                    </text>
                                </g>

                                {/* Traffic Paths - VPN */}
                                {(activeFlow === 'all' || activeFlow === 'vpn') && (
                                    <g opacity={activeFlow === 'vpn' ? 1 : 0.6}>
                                        {/* Public -> Network Stack Corner (240, 200) */}
                                        <path d="M 480 90 L 480 110 L 240 110 L 240 200" fill="none" stroke={colors.vpn} strokeWidth="3" strokeDasharray="8 4" markerEnd="url(#arr-vpn)" />
                                        <PathLabel x="360" y="105" text="Inbound VPN" color={colors.vpn} />

                                        {/* Tunnel continuation inside */}
                                        <path d="M 150 280 L 150 320" fill="none" stroke={colors.vpn} strokeWidth="3" markerEnd="url(#arr-vpn)" />
                                        <PathLabel x="130" y="300" text="Tunnel" color={colors.vpn} rotate="-90" />
                                    </g>
                                )}

                                {/* Traffic Paths - Exterior (Tailscale) */}
                                {(activeFlow === 'all' || activeFlow === 'exterior') && (
                                    <g opacity={activeFlow === 'exterior' ? 1 : 0.6}>
                                        {/* Tailscale -> Jellyfin (Direct) */}
                                        <path d="M 800 90 L 800 150 L 330 150 L 330 220" fill="none" stroke={colors.exterior} strokeWidth="2.5" markerEnd="url(#arr-ext)" />
                                        <PathLabel x="560" y="140" text="Private Mesh VPN" color={colors.exterior} />
                                    </g>
                                )}

                                {/* Traffic Paths - Standard Public Access */}
                                {(activeFlow === 'all') && (
                                    <g opacity="0.3">
                                        {/* Public -> Media Corner (750, 200) */}
                                        <path d="M 480 90 L 480 120 L 750 120 L 750 200" fill="none" stroke="#666" strokeWidth="1.5" markerEnd="url(#arr-std)" />

                                        {/* Public -> AI Labs Corner (970, 200) */}
                                        <path d="M 480 90 L 480 120 L 970 120 L 970 200" fill="none" stroke="#666" strokeWidth="1.5" markerEnd="url(#arr-std)" />

                                        {/* Public -> Tools Corner (1240, 200) */}
                                        <path d="M 480 90 L 480 120 L 1240 120 L 1240 200" fill="none" stroke="#666" strokeWidth="1.5" markerEnd="url(#arr-std)" />

                                        <PathLabel x="525" y="160" text="HTTP / Proxy" color="#888" />
                                    </g>
                                )}

                                {/* Traffic Paths - Automation */}
                                {(activeFlow === 'all' || activeFlow === 'automation') && (
                                    <g opacity={activeFlow === 'automation' ? 1 : 0.4}>
                                        <path d="M 670 280 L 670 320" fill="none" stroke={colors.arr} strokeWidth="2.5" markerEnd="url(#arr-logic)" />
                                        <path d="M 670 300 L 530 300 L 530 320" fill="none" stroke={colors.arr} strokeWidth="2.5" markerEnd="url(#arr-logic)" />
                                        <path d="M 670 300 L 390 300 L 390 320" fill="none" stroke={colors.arr} strokeWidth="2.5" markerEnd="url(#arr-logic)" />

                                        <path d="M 390 380 L 390 410 L 150 410 L 150 420" fill="none" stroke={colors.arr} strokeWidth="2" strokeDasharray="4 2" markerEnd="url(#arr-logic)" />
                                        <path d="M 530 380 L 530 410 L 390 410" fill="none" stroke={colors.arr} strokeWidth="2" strokeDasharray="4 2" />

                                        <path d="M 530 380 L 530 395 L 230 395 L 230 355 L 220 355" fill="none" stroke={colors.arr} strokeWidth="2.5" markerEnd="url(#arr-logic)" />
                                    </g>
                                )}

                                {/* Traffic Paths - Storage (HDD & SSD) */}
                                {(activeFlow === 'all' || activeFlow === 'storage') && (
                                    <g opacity={activeFlow === 'storage' ? 1 : 0.3}>
                                        {/* HDD Connections */}
                                        <path d="M 150 380 L 150 670" fill="none" stroke={colors.storage} strokeWidth="2" markerEnd="url(#arr-storage)" />
                                        <path d="M 330 280 L 330 670" fill="none" stroke={colors.storage} strokeWidth="2" markerEnd="url(#arr-storage)" />
                                        <path d="M 390 380 L 390 670" fill="none" stroke={colors.storage} strokeWidth="2" markerEnd="url(#arr-storage)" />
                                        <path d="M 530 380 L 530 670" fill="none" stroke={colors.storage} strokeWidth="2" markerEnd="url(#arr-storage)" />
                                        <path d="M 670 380 L 670 670" fill="none" stroke={colors.storage} strokeWidth="2" markerEnd="url(#arr-storage)" />

                                        <PathLabel x="240" y="650" text="High Capacity I/O" color={colors.storage} />

                                        {/* SSD Connections (Global) */}
                                        <line x1="150" y1="580" x2="150" y2="740" stroke={colors.storage} strokeWidth="1" strokeDasharray="2 4" opacity="0.5" />
                                        <line x1="525" y1="580" x2="525" y2="740" stroke={colors.storage} strokeWidth="1" strokeDasharray="2 4" opacity="0.5" />
                                        <line x1="890" y1="580" x2="890" y2="740" stroke={colors.storage} strokeWidth="1" strokeDasharray="2 4" opacity="0.5" />
                                        <line x1="1135" y1="580" x2="1135" y2="740" stroke={colors.storage} strokeWidth="1" strokeDasharray="2 4" opacity="0.5" />
                                    </g>
                                )}
                            </svg>
                        </div>

                        {/* Legend / Info Footer */}
                        <div className="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="p-4 rounded-xl bg-[#16161a] border border-gray-800">
                                <h3 className="text-white font-bold mb-3 flex items-center gap-2"><Lock size={16} className="text-purple-400" /> Secure Access</h3>
                                <p className="text-xs leading-relaxed" style={{ color: colors.subtext }}>
                                    External access is strictly controlled. <strong>Tailscale</strong> provides a private mesh for Jellyfin, while Wireguard secures downloads.
                                </p>
                            </div>
                            <div className="p-4 rounded-xl bg-[#16161a] border border-gray-800">
                                <h3 className="text-white font-bold mb-3 flex items-center gap-2"><HardDrive size={16} className="text-pink-400" /> Storage Tiering</h3>
                                <p className="text-xs leading-relaxed" style={{ color: colors.subtext }}>
                                    <strong>SSD:</strong> Underlying system drive for all containers, DBs, and config. <br />
                                    <strong>HDD:</strong> Dedicated bulk storage for media files, linked only to the download/playback stack.
                                </p>
                            </div>
                            <div className="p-4 rounded-xl bg-[#16161a] border border-gray-800">
                                <h3 className="text-white font-bold mb-3 flex items-center gap-2"><Cpu size={16} className="text-yellow-400" /> AI & Ops</h3>
                                <p className="text-xs leading-relaxed" style={{ color: colors.subtext }}>
                                    Ollama provides local inference for n8n workflows. Beszel monitors system-level metrics and reports to the Homepage dashboard.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Sub-component for Nodes
        const Node = ({ x, y, label, color, icon }) => (
            <g transform={`translate(${x}, ${y})`}>
                <rect width="120" height="50" rx="8" fill="#1e1e24" stroke={color} strokeWidth="1.5" className="transition-all hover:stroke-white cursor-pointer" />
                <text x="60" y="30" textAnchor="middle" className="text-[11px] font-bold fill-white pointer-events-none tracking-tight">{label}</text>
                {icon === 'shield' && <Shield size={12} x="5" y="5" className="text-purple-400 opacity-40" />}
            </g>
        );

        // Sub-component for Path Labels
        const PathLabel = ({ x, y, text, color, rotate = 0 }) => (
            <g transform={`translate(${x}, ${y}) rotate(${rotate})`}>
                <rect x="-45" y="-10" width="90" height="20" rx="10" fill="#0a0a0c" fillOpacity="0.9" />
                <text textAnchor="middle" y="4" className="text-[9px] font-black uppercase tracking-wider" style={{ fill: color }}>{text}</text>
            </g>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
